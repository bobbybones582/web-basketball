<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Basketball - Arena Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510; /* Dark arena feel */
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 2.5rem;
        }
        p {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }
        #scoreBoard {
            font-size: 2rem;
            font-weight: bold;
            color: #ffda75;
        }
        #powerBarContainer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 25px;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid white;
            border-radius: 15px;
            overflow: hidden;
            display: none;
            z-index: 10;
        }
        #powerBar {
            width: 0%;
            height: 100%;
            background: #ff3333;
            transition: background-color 0.1s;
        }
        #instructions {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 1.2rem;
            text-shadow: 1px 1px 3px black;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <!-- Load Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>3D Hoops Arena</h1>
        <p>Score: <span id="scoreBoard">0</span></p>
    </div>
    
    <div id="instructions">Click and hold to power up shot. Release to shoot! <br> (Click again to retrieve the ball)</div>

    <div id="powerBarContainer">
        <div id="powerBar"></div>
    </div>

    <script>
        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a16); // Darkened arena atmosphere
        scene.fog = new THREE.Fog(0x0a0a16, 20, 60);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4.5, 12); // Slightly raised camera to capture the new court layout

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // Bright arena-style overhead spot light pointing at the court
        const stadiumLight = new THREE.SpotLight(0xffffff, 1.2);
        stadiumLight.position.set(0, 25, 0);
        stadiumLight.angle = Math.PI / 3;
        stadiumLight.penumbra = 0.8;
        stadiumLight.castShadow = true;
        stadiumLight.shadow.mapSize.width = 2048;
        stadiumLight.shadow.mapSize.height = 2048;
        scene.add(stadiumLight);

        // Subdued directional rim light
        const sunLight = new THREE.DirectionalLight(0x8bc34a, 0.2); // Subtle green crowd spill reflection
        sunLight.position.set(-10, 15, -10);
        scene.add(sunLight);

        // --- COURT CANVAS GENERATOR (For detailed lines) ---
        function createCourtTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            // Hardwood floor base color
            ctx.fillStyle = '#db9f67';
            ctx.fillRect(0, 0, 1024, 1024);

            // Subtle wood plank pattern texture overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
            for(let i = 0; i < 1024; i += 16) {
                if(Math.random() > 0.3) {
                    ctx.fillRect(i, 0, 8, 1024);
                }
            }

            // Line styling configuration
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 8;
            ctx.fillStyle = '#cc8b52'; // Shaded inside paint areas

            // Dimensions mappings (1024 canvas coordinates maps to a 30x30 Three.js plane)
            // Center is (512, 512). The hoop backboard is near the top edge.

            // Main boundary line
            ctx.strokeRect(32, 32, 960, 960);

            // The Key / Paint Area (Top half area)
            ctx.fillRect(362, 32, 300, 380);
            ctx.strokeRect(362, 32, 300, 380);

            // Free throw line circle segment
            ctx.beginPath();
            ctx.arc(512, 412, 150, 0, Math.PI);
            ctx.stroke();

            // Center Court Line (Half court layout)
            ctx.beginPath();
            ctx.moveTo(32, 992);
            ctx.lineTo(992, 992);
            ctx.stroke();

            // Center Circle
            ctx.beginPath();
            ctx.arc(512, 992, 180, Math.PI, 0);
            ctx.stroke();

            // 3-Point Line Arc (Hoop focus sits roughly around 512, 230 on canvas map)
            ctx.beginPath();
            // Straight side parts of 3 pt line
            ctx.moveTo(112, 32);
            ctx.lineTo(112, 230);
            ctx.arc(512, 230, 400, Math.PI, 0);
            ctx.lineTo(912, 32);
            ctx.stroke();

            return new THREE.CanvasTexture(canvas);
        }

        // --- ENVIRONMENT BUILDER ---

        // 1. The Court with custom generated textures
        const courtGeo = new THREE.PlaneGeometry(30, 30);
        const courtMat = new THREE.MeshStandardMaterial({ 
            map: createCourtTexture(),
            roughness: 0.5,
            metalness: 0.1
        });
        const court = new THREE.Mesh(courtGeo, courtMat);
        court.rotation.x = -Math.PI / 2;
        court.receiveShadow = true;
        scene.add(court);

        // 2. The Backboard setup
        const boardGeo = new THREE.BoxGeometry(3.6, 2.4, 0.1);
        const boardMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
        const board = new THREE.Mesh(boardGeo, boardMat);
        board.position.set(0, 5, -11); // Moved deeper to fit the new lines context
        board.castShadow = true;
        board.receiveShadow = true;
        scene.add(board);

        // Target square on backboard
        const squareGeo = new THREE.PlaneGeometry(1.2, 0.9);
        const squareMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const square = new THREE.Mesh(squareGeo, squareMat);
        square.position.set(0, 5, -10.94);
        scene.add(square);

        // 3. The Rim
        const rimRadius = 0.6;
        const rimGeo = new THREE.TorusGeometry(rimRadius, 0.05, 16, 32);
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xff3300, metalness: 0.5 });
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.rotation.x = Math.PI / 2;
        rim.position.set(0, 4.2, -10.3);
        rim.castShadow = true;
        scene.add(rim);

        // 4. The Pole Support structures
        const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 5);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(0, 2.5, -11.3);
        pole.castShadow = true;
        scene.add(pole);

        // 5. Surrounding Arena Stands
        function buildStands() {
            const group = new THREE.Group();
            const standColor = 0x242530;
            const seatColor = 0x1b5e20; // Deep stadium green seats

            // Config array for the 3 wrapping walls [width, height, depth, posX, posY, posZ, rotY]
            const standConfigs = [
                [36, 6, 8, 0, 2.5, -18, 0],          // Back Stand behind basket
                [8, 6, 32, -18, 2.5, -1, Math.PI/2],  // Left Side Stand
                [8, 6, 32, 18, 2.5, -1, -Math.PI/2]   // Right Side Stand
            ];

            standConfigs.forEach(cfg => {
                const standBlockGeo = new THREE.BoxGeometry(cfg[0], cfg[1], cfg[2]);
                const standBlockMat = new THREE.MeshStandardMaterial({ color: standColor, roughness: 0.9 });
                const standMesh = new THREE.Mesh(standBlockGeo, standBlockMat);
                standMesh.position.set(cfg[3], cfg[4], cfg[5]);
                standMesh.rotation.y = cfg[6];
                standMesh.receiveShadow = true;
                group.add(standMesh);

                // Add tiered concrete step seating illusion layer
                for (let tier = 0; tier < 4; tier++) {
                    const stepGeo = new THREE.BoxGeometry(cfg[0], 0.6, 1.2);
                    const stepMat = new THREE.MeshStandardMaterial({ color: seatColor, roughness: 0.7 });
                    const stepMesh = new THREE.Mesh(stepGeo, stepMat);
                    
                    // Layering offsets step-by-step upward/backward based on block orientation
                    stepMesh.position.set(cfg[3], (cfg[4] - 2) + (tier * 1.1), cfg[5] + (tier * 1.5) - 2);
                    stepMesh.rotation.y = cfg[6];
                    
                    // Correcting alignment calculation for the rotated side stands 
                    if (cfg[6] !== 0) {
                        stepMesh.position.set(cfg[3] + (tier * 1.5) - 2, (cfg[4] - 2) + (tier * 1.1), cfg[5]);
                    }
                    
                    group.add(stepMesh);
                }
            });

            return group;
        }
        const stadiumStands = buildStands();
        scene.add(stadiumStands);


        // --- THE BALL ---
        const ballRadius = 0.35;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ 
            color: 0xe66a10,
            roughness: 0.6
        });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.castShadow = true;
        scene.add(ball);

        // Structural lines setup onto basketball
        const lineMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
        const lineGeo1 = new THREE.TorusGeometry(ballRadius + 0.01, 0.015, 8, 32);
        const line1 = new THREE.Mesh(lineGeo1, lineMat);
        const line2 = new THREE.Mesh(lineGeo1, lineMat);
        line2.rotation.y = Math.PI / 2;
        ball.add(line1);
        ball.add(line2);

        // --- GAME VARIABLES ---
        const ballStartPos = new THREE.Vector3(0, 1.5, 5); // Aligned cleanly with court line boundaries
        ball.position.copy(ballStartPos);

        let velocity = new THREE.Vector3(0, 0, 0);
        let isShooting = false;
        let isAiming = false;
        let power = 0;
        let score = 0;
        let canScore = false;
        let ballRotationalVelocity = new THREE.Vector3(0,0,0);

        // HTML Targets
        const powerBar = document.getElementById('powerBar');
        const powerContainer = document.getElementById('powerBarContainer');
        const scoreBoard = document.getElementById('scoreBoard');
        const instructions = document.getElementById('instructions');

        // --- CONTROLS ---
        window.addEventListener('mousedown', () => {
            if (!isShooting) {
                isAiming = true;
                power = 0;
                powerContainer.style.display = 'block';
                instructions.style.display = 'none';
            } else if (ball.position.y < ballRadius + 0.1 && velocity.lengthSq() < 1) {
                resetBall();
            }
        });

        window.addEventListener('mouseup', () => {
            if (isAiming) {
                isAiming = false;
                isShooting = true;
                canScore = true;
                powerContainer.style.display = 'none';
                
                // Adjusted trajectory to handle court scaling shift depth change
                const forwardForce = -10 - (power * 0.14);
                const upwardForce = 9 + (power * 0.11);
                
                velocity.set(0, upwardForce, forwardForce);
                ballRotationalVelocity.set(-0.25, 0, 0); // Active backspin
            }
        });

        // Touch setups
        window.addEventListener('touchstart', (e) => { e.preventDefault(); window.dispatchEvent(new Event('mousedown')); }, {passive: false});
        window.addEventListener('touchend', (e) => { e.preventDefault(); window.dispatchEvent(new Event('mouseup')); }, {passive: false});

        function resetBall() {
            ball.position.copy(ballStartPos);
            velocity.set(0, 0, 0);
            ballRotationalVelocity.set(0, 0, 0);
            ball.rotation.set(0, 0, 0);
            isShooting = false;
            canScore = false;
            instructions.style.display = 'block';
            instructions.innerHTML = "Click and hold to power up shot. Release to shoot!";
        }

        // --- PHYSICS & ANIMATION ENGINE ---
        const gravity = -24; 
        const timeStep = 1 / 60;

        function animate() {
            requestAnimationFrame(animate);

            // Handle Aim Bar Updates
            if (isAiming) {
                power += 2.0; 
                if (power > 100) power = 100;
                
                powerBar.style.width = power + '%';
                
                let r, g;
                if (power < 50) {
                    r = Math.floor(255 * (power / 50));
                    g = 255;
                } else {
                    r = 255;
                    g = Math.floor(255 * ((100 - power) / 50));
                }
                powerBar.style.backgroundColor = `rgb(${r}, ${g}, 0)`;
            }

            // Realtime Physics Simulation Updates
            if (isShooting) {
                velocity.y += gravity * timeStep;
                ball.position.addScaledVector(velocity, timeStep);
                ball.rotation.x += ballRotationalVelocity.x;

                // 1. Wood Floor Collision handling
                if (ball.position.y <= ballRadius) {
                    ball.position.y = ballRadius;
                    velocity.y *= -0.68; // Bounce bounce engine factor
                    velocity.z *= 0.85;  
                    velocity.x *= 0.85;
                    ballRotationalVelocity.x *= 0.75;
                }

                // 2. Expanded Backboard Collision detection
                if (ball.position.z <= -10.9 + ballRadius && ball.position.z >= -11.1 - ballRadius) {
                    if (ball.position.y >= 3.8 && ball.position.y <= 6.2 && Math.abs(ball.position.x) <= 1.8) {
                        ball.position.z = -10.9 + ballRadius; 
                        velocity.z *= -0.35; 
                    }
                }

                // 3. Hoop Metal Rim Collision engine
                const distToRimCenter = new THREE.Vector2(ball.position.x, ball.position.z - (-10.3)).length();
                if (Math.abs(ball.position.y - 4.2) < ballRadius && distToRimCenter > (rimRadius - ballRadius) && distToRimCenter < (rimRadius + ballRadius)) {
                    const angle = Math.atan2(ball.position.z - (-10.3), ball.position.x);
                    velocity.x = Math.cos(angle) * 3.5;
                    velocity.z = Math.sin(angle) * 3.5;
                    velocity.y *= -0.45;
                }

                // 4. Score Tracking Verification Point
                if (canScore && velocity.y < 0 && ball.position.y < 4.2 && ball.position.y > 3.8) {
                    if (distToRimCenter < rimRadius) {
                        score++;
                        scoreBoard.innerText = score;
                        canScore = false; 
                        
                        // Green flashy celebration
                        scene.background.setHex(0x2e7d32);
                        setTimeout(() => { scene.background.setHex(0x0a0a16); }, 300);
                    }
                }

                // Bounds tracking reset hint
                if (ball.position.z > 14 || Math.abs(ball.position.x) > 15) {
                    instructions.style.display = 'block';
                    instructions.innerHTML = "Ball went out of bounds. Click anywhere to reset.";
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // --- WINDOW ADJUSTMENTS ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
